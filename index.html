<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Task Organizer</title>
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
}
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}
input, button {
  width: 100%;
  padding: 8px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  font-size: 14px;
}
button {
  background: #00ffcc;
  cursor: pointer;
}
.hidden { display: none; }
.nav {
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.5);
  padding: 15px;
}
.nav button { width: auto; }
.section { padding: 20px; }
.task-item {
  background: rgba(255,255,255,0.2);
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.completed { text-decoration: line-through; color: lightgreen; }
.progress-circle {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: conic-gradient(green 0deg, green 0deg, red 0deg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  margin: auto;
}
.delete-btn {
  background: red;
  color: white;
  padding: 5px 10px;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="container" id="auth">
  <div class="card">
    <h2>Login / Signup</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
  </div>
</div>

<div id="dashboard" class="hidden">
  <div class="nav">
    <button onclick="showSection('tasks')">Tasks</button>
    <button onclick="showSection('progress')">Progress</button>
  </div>

  <div id="tasks" class="section">
    <h2>Task Manager</h2>
    <input type="text" id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add Task</button>
    <div id="taskList"></div>
  </div>

  <div id="progress" class="section hidden">
    <h2>Progress</h2>
    <div class="progress-circle" id="progressCircle">0%</div>
  </div>
</div>

<script>
let tasks = [];
let completed = 0;

function login(){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
}
function signup(){ login(); }

function showSection(section){
  document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
  document.getElementById(section).classList.remove('hidden');
}

function addTask(){
  let input = document.getElementById('taskInput');
  let value = input.value;
  if(value === '') return;

  tasks.push({text:value, done:false});
  input.value = '';
  renderTasks();
}

function renderTasks(){
  let list = document.getElementById('taskList');
  list.innerHTML = '';

  tasks.forEach((task, index)=>{
    let div = document.createElement('div');
    div.className = 'task-item ' + (task.done ? 'completed':'');

    let span = document.createElement('span');
    span.innerText = task.text;
    span.onclick = ()=>toggleTask(index);

    let del = document.createElement('button');
    del.innerText = 'Delete';
    del.className = 'delete-btn';
    del.onclick = (e)=>{
      e.stopPropagation();
      deleteTask(index);
    };

    div.appendChild(span);
    div.appendChild(del);
    list.appendChild(div);
  });

  updateProgress();
}

function toggleTask(index){
  if(!tasks[index].done){
    tasks[index].done = true;
    completed++;
  }
  renderTasks();
}

function deleteTask(index){
  if(tasks[index].done) completed--;
  tasks.splice(index,1);
  renderTasks();
}

function updateProgress(){
  let percent = tasks.length === 0 ? 0 : Math.floor((completed/tasks.length)*100);
  let circle = document.getElementById('progressCircle');
  circle.innerText = percent + '%';
  circle.style.background = `conic-gradient(green ${percent*3.6}deg, red ${percent*3.6}deg)`;
}
</script>

</body>
</html>
